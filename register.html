<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NextRole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="back-home">
        <a href="index.html">← Back to Home</a>
    </div>
    
    <section class="auth-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p>Start building your next career opportunity.</p>
            <form>
                <input
                    type="text"
                    placeholder="Full Name"
                    required
                >
                <input 
                    type="email"
                    placeholder="Email Address"
                    required
                >
                <input 
                    type="password"
                    placeholder="Password"
                    required
                >
                <button type="submit">Create Account</button> 
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="login.html">
                    Login
                </a>
            </p>
        </div>
    </section>
</body>
</html>
